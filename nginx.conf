server {
    listen 80;
    listen [::]:80;
    server_name vpnhide.duckdns.org;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vpnhide.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/vpnhide.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vpnhide.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Важно: убираем обработку статики на хосте
        proxy_intercept_errors off;
    }
}